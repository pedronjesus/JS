<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lançando Exceções</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Lançando Exceções (`throw`)</h1>
    <p>Insira dois números para realizar uma divisão. Tente dividir por zero!</p>

    <form id="form-divisao">
        <input type="number" id="dividendo" placeholder="Dividendo" value="10">
        <input type="number" id="divisor" placeholder="Divisor" value="2">
        <button type="submit">Dividir</button>
    </form>

    <div id="resultado-mensagem" class="mensagem"></div>

    <script src="script.js"></script>
</body>
</html>
